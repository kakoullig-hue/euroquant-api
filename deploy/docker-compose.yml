# EuroQuant local development stack
# Usage:  docker compose up -d

version: "3.9"

services:
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: euroquant_api
    ports:
      - "8000:8000"
    env_file:
      - ../api/.env
    environment:
      - NEO4J_URI=bolt://neo4j:7687
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      # Mount cache so sanctions lists persist across restarts
      - sanctions_cache:/app/.cache
    restart: unless-stopped

  neo4j:
    image: neo4j:5.25-community
    container_name: euroquant_neo4j
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol
    environment:
      - NEO4J_AUTH=neo4j/euroquant_dev_only
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_max__size=1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 6
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
  sanctions_cache:
