# Local development overrides — merged automatically by Docker Compose
# Mounts source code for hot reload; drops to single worker for faster restarts

services:
  api:
    volumes:
      - .:/app
      - sanctions_cache:/app/.cache
    command:
      - uvicorn
      - api.main:app
      - --host=0.0.0.0
      - --port=8000
      - --reload
      - --workers=1
    environment:
      LOG_LEVEL: DEBUG
