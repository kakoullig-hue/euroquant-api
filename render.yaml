services:
  - type: web
    name: euroquant-api
    runtime: python
    plan: free
    buildCommand: pip install -r api/requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: EUROQUANT_API_KEYS
        sync: false
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USER
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: JARVIS_MODEL
        value: claude-sonnet-4-20250514
      - key: LOG_LEVEL
        value: INFO
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: MAX_INGESTION_MB
        value: "50"

  - type: web
    name: euroquant-demo
    runtime: static
    buildCommand: echo "static"
    staticPublishPath: web
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
