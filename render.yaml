services:
  - type: web
    name: euroquant-api
    runtime: python
    plan: free
    buildCommand: pip install -r api/requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: EUROQUANT_API_KEYS
        sync: false
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USER
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: JARVIS_MODEL
        value: claude-sonnet-4-20250514
      - key: LOG_LEVEL
        value: INFO
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: MAX_INGESTION_MB
        value: "50"

  - type: web
    name: euroquant-demo
    runtime: static
    # Demo-only build: vite.config.js hard-fails if VITE_API_KEY is present,
    # so this bundle can never embed a gateway key. dashboard.html is copied
    # to index.html so the bare domain (DEMO_URL) serves the Risk Terminal.
    #
    # The built files are copied to a top-level `public/` and that is the
    # publish path. This is deliberate: Render's publish-path resolution for
    # this service does not reliably honour a subdirectory (both `web/dist`
    # and a root-dir=web + `dist` config failed with "does not exist"). The
    # build's shell ends at the repo root (cd ..) and `public/` lives at the
    # repo root, so the path resolves no matter how Render interprets it.
    buildCommand: cd web && npm ci && npm run build && cp dist/dashboard.html dist/index.html && cd .. && rm -rf public && cp -r web/dist public
    staticPublishPath: public
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
