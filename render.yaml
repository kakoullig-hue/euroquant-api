services:
  - type: web
    name: euroquant-api
    runtime: python
    plan: free
    buildCommand: pip install -r api/requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: EUROQUANT_API_KEYS
        sync: false
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USER
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: JARVIS_MODEL
        value: claude-sonnet-4-20250514
      - key: LOG_LEVEL
        value: INFO
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: MAX_INGESTION_MB
        value: "50"

  - type: web
    name: euroquant-demo
    runtime: static
    # Demo-only build: vite.config.js hard-fails if VITE_API_KEY is present,
    # so this bundle can never embed a gateway key. Root serves the Risk
    # Terminal demo (dashboard.html copied to index.html — DEMO_URL points
    # at the bare domain).
    # NOTE: the trailing `cd ..` is load-bearing — Render resolves
    # staticPublishPath relative to the build command's final working
    # directory. Without returning to the repo root, it looks for
    # web/web/dist and fails with "Publish directory web/dist does not exist".
    buildCommand: cd web && npm ci && npm run build && cp dist/dashboard.html dist/index.html && cd ..
    staticPublishPath: web/dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
